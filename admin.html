<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panou Admin — EvalPrep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f7f4',100:'#d9ede2',200:'#b5dbc7',300:'#85c2a4',400:'#56a57e',500:'#368763',600:'#276c4f',700:'#205741',800:'#1c4635',900:'#183a2d',950:'#0c2019' },
            surface: { 50:'#fafbfc',100:'#f3f5f7',200:'#e8ecf0',300:'#d5dbe3',400:'#a8b3c0' },
            accent: { warm:'#e8985e',warmLight:'#fdf3eb',sky:'#4a9eca',skyLight:'#edf6fb' }
          },
          fontFamily: { display:['"DM Serif Display"','serif'], body:['"Inter"','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1,h2,h3,.font-display { font-family: 'DM Serif Display', serif; }
    .card-elevated { box-shadow: 0 1px 2px rgba(54,135,99,0.04), 0 4px 12px rgba(54,135,99,0.06), 0 12px 32px rgba(54,135,99,0.04); }
    .card-floating { box-shadow: 0 2px 4px rgba(54,135,99,0.05), 0 8px 24px rgba(54,135,99,0.08), 0 24px 48px rgba(54,135,99,0.06); }
    .nav-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .btn-primary:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(54,135,99,0.3),0 0 0 1px rgba(54,135,99,0.8); }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
    .status-in_progress { background: #edf6fb; color: #4a9eca; }
    .status-uploading { background: #fdf3eb; color: #e8985e; }
    .status-completed { background: #d9ede2; color: #276c4f; }
    .status-expired { background: #fef2f2; color: #dc2626; }

    dialog::backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    dialog { border: none; border-radius: 1rem; padding: 0; max-width: 90vw; width: 480px; }
    dialog[open] { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .img-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
    .img-thumb:hover { border-color: #368763; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  </style>
</head>
<body class="bg-surface-50 antialiased min-h-screen">

  <!-- Navigation -->
  <nav class="sticky top-0 z-50 nav-blur bg-white/80 border-b border-surface-200/60">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-4">
          <a href="/" class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-xl bg-brand-500 flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
              </svg>
            </div>
            <span class="font-display text-xl text-brand-800 tracking-tight">EvalPrep</span>
          </a>
          <span class="hidden sm:inline-block px-3 py-1 rounded-lg bg-red-50 text-red-600 text-xs font-bold uppercase tracking-wider">Admin</span>
        </div>
        <button onclick="logout()" class="px-4 py-2 text-sm font-medium text-gray-600 rounded-lg hover:text-red-600 hover:bg-red-50 transition-colors duration-200 focus-visible:outline-none">
          Deconectare
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

    <!-- Tabs -->
    <div class="flex gap-2 mb-8 border-b border-surface-200">
      <button id="tabSim" onclick="switchTab('simulations')" class="px-5 py-3 text-sm font-semibold border-b-2 border-brand-500 text-brand-700 transition-colors">Simulări</button>
      <button id="tabSub" onclick="switchTab('submissions')" class="px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">Lucrări primite</button>
    </div>

    <!-- ═══════ SIMULATIONS TAB ═══════ -->
    <section id="sectionSimulations">
      <div class="flex items-center justify-between mb-6">
        <h2 class="font-display text-xl text-brand-950">Gestionare simulări</h2>
        <button onclick="openUploadDialog()" class="btn-primary px-5 py-2.5 text-sm font-semibold text-white bg-brand-500 rounded-xl hover:bg-brand-600 active:bg-brand-700 transition-colors duration-200 focus-visible:outline-none flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Adaugă simulare
        </button>
      </div>

      <div id="simulationsList" class="space-y-3">
        <!-- Filled by JS -->
      </div>
      <div id="noSimulations" class="hidden text-center py-16 text-gray-400">
        <svg class="w-12 h-12 mx-auto mb-3 text-surface-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <p class="text-sm">Nicio simulare adăugată. Apasă butonul de mai sus.</p>
      </div>
    </section>

    <!-- ═══════ SUBMISSIONS TAB ═══════ -->
    <section id="sectionSubmissions" class="hidden">
      <h2 class="font-display text-xl text-brand-950 mb-6">Lucrări primite de la elevi</h2>

      <div id="submissionsList" class="space-y-4">
        <!-- Filled by JS -->
      </div>
      <div id="noSubmissions" class="hidden text-center py-16 text-gray-400">
        <p class="text-sm">Nicio lucrare primită încă.</p>
      </div>
    </section>
  </main>

  <!-- Upload/Edit Dialog -->
  <dialog id="uploadDialog">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 id="dialogTitle" class="font-display text-xl text-brand-950">Adaugă simulare</h3>
        <button onclick="document.getElementById('uploadDialog').close()" class="p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-surface-100 transition-colors focus-visible:outline-none">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div id="dialogError" class="hidden mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm"></div>

      <form id="simForm" class="space-y-4">
        <input type="hidden" id="editId" value="">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Titlu simulare</label>
          <input type="text" id="simTitle" required placeholder="ex: Simulare Matematică — Varianta 1"
            class="w-full px-4 py-3 rounded-xl border border-surface-300 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Materie</label>
          <select id="simSubject" required
            class="w-full px-4 py-3 rounded-xl border border-surface-300 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition-all bg-white">
            <option value="">Selectează...</option>
            <option value="Matematică">Matematică</option>
            <option value="Limba Română">Limba Română</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Descriere (opțional)</label>
          <textarea id="simDesc" rows="2" placeholder="Scurtă descriere..."
            class="w-full px-4 py-3 rounded-xl border border-surface-300 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition-all resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" id="pdfLabel">Fișier PDF</label>
          <input type="file" id="simPdf" accept="application/pdf"
            class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 file:cursor-pointer file:transition-colors">
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" onclick="document.getElementById('uploadDialog').close()"
            class="flex-1 py-3 text-sm font-semibold text-gray-600 bg-surface-100 rounded-xl hover:bg-surface-200 transition-colors">
            Anulează
          </button>
          <button type="submit" id="simSubmitBtn"
            class="btn-primary flex-1 py-3 text-sm font-semibold text-white bg-brand-500 rounded-xl hover:bg-brand-600 transition-colors focus-visible:outline-none disabled:opacity-60">
            Încarcă
          </button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Imagine lucrare">
  </div>

  <script>
    const statusLabels = { in_progress: 'În desfășurare', uploading: 'Încărcare', completed: 'Trimisă', expired: 'Expirată' };

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    function switchTab(tab) {
      const tabSim = document.getElementById('tabSim');
      const tabSub = document.getElementById('tabSub');
      const secSim = document.getElementById('sectionSimulations');
      const secSub = document.getElementById('sectionSubmissions');

      if (tab === 'simulations') {
        secSim.classList.remove('hidden'); secSub.classList.add('hidden');
        tabSim.className = 'px-5 py-3 text-sm font-semibold border-b-2 border-brand-500 text-brand-700 transition-colors';
        tabSub.className = 'px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
      } else {
        secSub.classList.remove('hidden'); secSim.classList.add('hidden');
        tabSub.className = 'px-5 py-3 text-sm font-semibold border-b-2 border-brand-500 text-brand-700 transition-colors';
        tabSim.className = 'px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
        loadSubmissions();
      }
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('ro-RO', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // ── Simulations ──
    function openUploadDialog(sim = null) {
      const dialog = document.getElementById('uploadDialog');
      const title = document.getElementById('dialogTitle');
      const form = document.getElementById('simForm');
      const pdfInput = document.getElementById('simPdf');
      const pdfLabel = document.getElementById('pdfLabel');
      const submitBtn = document.getElementById('simSubmitBtn');
      document.getElementById('dialogError').classList.add('hidden');

      form.reset();
      document.getElementById('editId').value = '';

      if (sim) {
        title.textContent = 'Editează simulare';
        submitBtn.textContent = 'Salvează';
        document.getElementById('editId').value = sim.id;
        document.getElementById('simTitle').value = sim.title;
        document.getElementById('simSubject').value = sim.subject;
        document.getElementById('simDesc').value = sim.description || '';
        pdfLabel.textContent = 'Fișier PDF (lasă gol pentru a păstra PDF-ul curent)';
        pdfInput.removeAttribute('required');
      } else {
        title.textContent = 'Adaugă simulare';
        submitBtn.textContent = 'Încarcă';
        pdfLabel.textContent = 'Fișier PDF';
        pdfInput.setAttribute('required', '');
      }

      dialog.showModal();
    }

    document.getElementById('simForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('simSubmitBtn');
      const errEl = document.getElementById('dialogError');
      errEl.classList.add('hidden');
      btn.disabled = true;

      const editId = document.getElementById('editId').value;
      const formData = new FormData();
      formData.append('title', document.getElementById('simTitle').value);
      formData.append('subject', document.getElementById('simSubject').value);
      formData.append('description', document.getElementById('simDesc').value);

      const pdfFile = document.getElementById('simPdf').files[0];
      if (pdfFile) formData.append('pdf', pdfFile);

      try {
        const url = editId ? `/api/admin/simulations/${editId}` : '/api/admin/simulations';
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, { method, body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        document.getElementById('uploadDialog').close();
        loadSimulations();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    });

    async function deleteSim(id, title) {
      if (!confirm(`Sigur vrei să ștergi "${title}"?`)) return;
      try {
        const res = await fetch(`/api/admin/simulations/${id}`, { method: 'DELETE' });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
        loadSimulations();
      } catch (err) {
        alert('Eroare: ' + err.message);
      }
    }

    async function loadSimulations() {
      try {
        const res = await fetch('/api/admin/simulations');
        const data = await res.json();
        const container = document.getElementById('simulationsList');
        const noSims = document.getElementById('noSimulations');

        container.innerHTML = '';

        if (data.simulations.length === 0) {
          noSims.classList.remove('hidden');
          return;
        }
        noSims.classList.add('hidden');

        data.simulations.forEach(sim => {
          container.innerHTML += `
            <div class="card-elevated rounded-xl p-4 bg-white border border-surface-200/60 flex flex-col sm:flex-row sm:items-center gap-3">
              <div class="flex items-center gap-3 flex-1 min-w-0">
                <div class="w-10 h-10 rounded-lg ${sim.subject === 'Matematică' ? 'bg-brand-50 text-brand-600' : 'bg-amber-50 text-amber-600'} flex items-center justify-center shrink-0">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                  </svg>
                </div>
                <div class="min-w-0">
                  <h4 class="font-semibold text-gray-800 text-sm truncate">${sim.title}</h4>
                  <p class="text-xs text-gray-400">${sim.subject} — ${formatDate(sim.created_at)} — ${sim.original_name || 'PDF'}</p>
                </div>
              </div>
              <div class="flex gap-2 shrink-0">
                <button onclick='openUploadDialog(${JSON.stringify(sim).replace(/'/g, "\\'")})'
                  class="px-3 py-2 text-xs font-semibold text-brand-700 bg-brand-50 rounded-lg hover:bg-brand-100 transition-colors focus-visible:outline-none">
                  Editează
                </button>
                <button onclick="deleteSim(${sim.id}, '${sim.title.replace(/'/g, "\\'")}')"
                  class="px-3 py-2 text-xs font-semibold text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors focus-visible:outline-none">
                  Șterge
                </button>
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
      }
    }

    // ── Submissions ──
    async function loadSubmissions() {
      try {
        const res = await fetch('/api/admin/submissions');
        const data = await res.json();
        const container = document.getElementById('submissionsList');
        const noSubs = document.getElementById('noSubmissions');

        container.innerHTML = '';

        if (data.submissions.length === 0) {
          noSubs.classList.remove('hidden');
          return;
        }
        noSubs.classList.add('hidden');

        data.submissions.forEach(sub => {
          const imagesHtml = sub.images.map(img =>
            `<img src="/api/admin/submissions/${sub.id}/images/${img.filename}" alt="${img.original_name}" class="img-thumb" onclick="openLightbox(this.src)" title="${img.original_name}">`
          ).join('');

          container.innerHTML += `
            <div class="card-elevated rounded-xl p-5 bg-white border border-surface-200/60">
              <div class="flex flex-col sm:flex-row sm:items-start gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-2 flex-wrap">
                    <h4 class="font-semibold text-gray-800">${sub.student_name}</h4>
                    <span class="text-xs text-gray-400">(${sub.student_email})</span>
                    <span class="status-badge status-${sub.status}">${statusLabels[sub.status]}</span>
                  </div>
                  <p class="text-sm text-gray-600 mb-1"><strong>${sub.simulation_title}</strong> — ${sub.simulation_subject}</p>
                  <p class="text-xs text-gray-400">Început: ${formatDate(sub.started_at)}</p>
                </div>
              </div>
              ${sub.images.length > 0 ? `
                <div class="mt-4 pt-4 border-t border-surface-200">
                  <p class="text-xs font-semibold text-gray-500 mb-2">${sub.images.length} ${sub.images.length === 1 ? 'imagine' : 'imagini'} încărcate:</p>
                  <div class="flex flex-wrap gap-2">${imagesHtml}</div>
                </div>
              ` : `
                <div class="mt-4 pt-4 border-t border-surface-200">
                  <p class="text-xs text-gray-400 italic">Nicio imagine încărcată.</p>
                </div>
              `}
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
      }
    }

    // ── Lightbox ──
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

    // ── Init ──
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const data = await res.json();
        if (data.user.role !== 'admin') { window.location.href = '/dashboard.html'; return; }
        loadSimulations();
      } catch (e) {
        window.location.href = '/';
      }
    })();
  </script>
</body>
</html>
